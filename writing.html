<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Writing — Giselle Cory</title>
  <meta name="description" content="Giselle Cory's writing, media appearances and publications.">

  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="icon" href="favicon-32.png" sizes="32x32" type="image/png">
  <link rel="icon" href="favicon-16.png" sizes="16x16" type="image/png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="theme-color" content="#E87722">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #FCF8F2;
      --section:   #F4ECE0;
      --ink:       #201B2E;
      --ink-soft:  #46414F;
      --coral:     #D8451F;
      --coral-text:#B83214;
      --teal:      #0F766E;
      --plum:      #6B2FA0;
      --mustard:   #B7791F;
      --pink:      #C2255C;
      --line:      #E2D7C7;
      --focus:     #0F766E;
    }

    html { scroll-behavior: smooth; }
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 1.0625rem;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .skip-link {
      position: absolute; left: -999px; top: 0;
      background: var(--ink); color: #fff; padding: 0.7rem 1.1rem;
      border-radius: 0 0 8px 0; z-index: 1000; font-weight: 600;
    }
    .skip-link:focus { left: 0; }

    a:focus-visible, button:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 3px;
      border-radius: 3px;
    }

    .wrap { width: min(1080px, 100% - 3rem); margin-inline: auto; }

    /* ===== NAV ===== */
    .site-nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(252, 248, 242, 0.94);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
    }
    .nav-inner {
      width: min(1080px, 100% - 3rem); margin-inline: auto;
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem; padding: 0.9rem 0; flex-wrap: wrap;
    }
    .nav-name {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 600; font-size: 1.2rem; letter-spacing: 0.01em;
      color: var(--ink); text-decoration: none; white-space: nowrap;
    }
    .nav-name span { color: var(--coral); }
    .nav-menu {
      display: flex; gap: 1.4rem; list-style: none; flex-wrap: wrap;
    }
    .nav-menu a {
      font-size: 0.82rem; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; text-decoration: none;
      color: var(--ink-soft); padding: 0.25rem 0; position: relative;
    }
    .nav-menu a::after {
      content: ''; position: absolute; left: 0; bottom: -2px;
      width: 0; height: 2px; background: var(--coral); transition: width 0.25s ease;
    }
    .nav-menu a:hover, .nav-menu a:focus-visible { color: var(--ink); }
    .nav-menu a:hover::after, .nav-menu a:focus-visible::after { width: 100%; }
    .nav-menu a[aria-current="page"] { color: var(--ink); }
    .nav-menu a[aria-current="page"]::after { width: 100%; }

    /* ===== HERO ===== */
    .hero { padding: clamp(2.5rem, 7vw, 5.5rem) 0 clamp(2rem, 5vw, 3.5rem); }
    .hero-grid {
      display: grid; grid-template-columns: 1.05fr 0.95fr;
      gap: clamp(2rem, 5vw, 4rem); align-items: center;
    }
    .hero h1 {
      font-family: 'Fraunces', Georgia, serif; font-weight: 500;
      font-size: clamp(2.4rem, 5.5vw, 4rem); line-height: 1.05;
      letter-spacing: -0.01em; margin-bottom: 1.3rem;
    }
    .hero h1 em { font-style: italic; color: var(--coral); }
    .hero-figure { position: relative; }
    .hero-figure img {
      width: 100%; height: auto; display: block; border-radius: 14px;
      box-shadow: 0 22px 48px -22px rgba(32, 27, 46, 0.45);
    }
    .hero-figure .swatch {
      position: absolute; border-radius: 14px; z-index: -1;
      inset: 18px -18px -18px 18px; background: var(--plum);
    }

    /* ===== SECTIONS ===== */
    section { scroll-margin-top: 80px; }
    .band { padding: clamp(3rem, 7vw, 5rem) 0; }
    .band.alt { background: var(--section); border-block: 1px solid var(--line); }
    .section-head {
      display: flex; align-items: baseline; gap: 1rem; margin-bottom: 2rem;
    }
    .section-head h2 {
      font-family: 'Fraunces', Georgia, serif; font-weight: 600;
      font-size: clamp(1.8rem, 4vw, 2.6rem); line-height: 1.1; letter-spacing: -0.01em;
    }

    /* ===== WRITING GRID ===== */
    .writing-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.1rem;
      position: relative;
    }

    .writing-tile {
      cursor: pointer;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid transparent;
      background: var(--section);
      transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
      display: flex;
      flex-direction: column;
    }
    .writing-tile:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 28px -10px rgba(32, 27, 46, 0.25);
      border-color: var(--coral);
    }
    .writing-tile.active {
      border-color: var(--coral);
      box-shadow: 0 10px 28px -10px rgba(32, 27, 46, 0.25);
    }
    .writing-tile:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
    }
    .writing-tile img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
    }
    .writing-tile-label {
      padding: 0.55rem 0.75rem;
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--ink-soft);
      background: var(--bg);
      flex: 1;
    }

    /* ===== GRID EXPANDER (Option B: inline row expand) ===== */
    .grid-expander {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 2rem;
      padding: 1.75rem;
      background: var(--section);
      border-radius: 14px;
      border: 1px solid var(--line);
      position: relative;
      animation: expandIn 0.22s ease;
    }
    @keyframes expandIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      .grid-expander { animation: none; }
    }
    .expander-figure img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: 10px;
      display: block;
    }
    .expander-content {
      align-self: center;
    }
    .expander-content p {
      margin-bottom: 0.85rem;
      max-width: 60ch;
      line-height: 1.65;
    }
    .expander-content p:last-child { margin-bottom: 0; }
    .expander-content a {
      color: var(--coral-text);
      text-underline-offset: 3px;
    }
    .expander-content a:hover { color: var(--coral); }
    .expander-close {
      position: absolute;
      top: 0.85rem;
      right: 0.85rem;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 50%;
      width: 2rem;
      height: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.1rem;
      color: var(--ink-soft);
      line-height: 1;
      transition: background 0.15s, color 0.15s;
    }
    .expander-close:hover {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    /* ===== FOOTER ===== */
    .site-footer { background: var(--ink); color: #EFE9F2; padding: 3rem 0; }
    .footer-inner { display: flex; align-items: center; justify-content: flex-end; gap: 1.5rem; flex-wrap: wrap; }
    .footer-links { display: flex; align-items: center; gap: 1.4rem; }
    .footer-links a { color: #EFE9F2; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.95rem; }
    .footer-links a:hover { color: #fff; text-decoration: underline; text-underline-offset: 3px; }
    .footer-links svg { width: 22px; height: 22px; flex: none; }
    .footer-links a:focus-visible { outline-color: #E0A21B; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 820px) {
      .hero-grid { grid-template-columns: 1fr; }
      .hero-figure .swatch { inset: 12px -12px -12px 12px; }
      .nav-menu { gap: 1rem; width: 100%; }
      .grid-expander { grid-template-columns: 1fr; }
      .expander-figure { display: none; }
    }
    @media (max-width: 480px) {
      .nav-menu { font-size: 0.75rem; }
      .writing-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <header class="site-nav">
    <nav class="nav-inner" aria-label="Primary">
      <a class="nav-name" href="index.html">Giselle <span>Cory</span></a>
      <ul class="nav-menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="social-sector.html">Social sector</a></li>
        <li><a href="writing.html" aria-current="page">Writing</a></li>
      </ul>
    </nav>
  </header>

  <main id="main">

    <!-- HERO -->
    <section class="hero wrap" aria-labelledby="hero-title">
      <div class="hero-grid">
        <div>
          <h1 id="hero-title">Writing <em>&amp; media</em></h1>
        </div>
        <figure class="hero-figure">
          <span class="swatch" aria-hidden="true"></span>
          <img src="Assets/Headshots/web_giselle_deptford.jpg" width="1600" height="1064"
               alt="Giselle Cory, second from right, on a panel of five writers reading from books on stage.">
        </figure>
      </div>
    </section>

    <!-- WRITING AND MEDIA -->
    <section id="writing-media" class="band">
      <div class="wrap">
        <div class="section-head"><h2>Writing and media</h2></div>
        <div class="writing-grid" id="writingGrid" role="list" aria-label="Writing and media portfolio"></div>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <div class="wrap footer-inner">
      <div class="footer-links">
        <a href="https://www.linkedin.com/in/gisellecory/" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" focusable="false">
            <path d="M20.45 20.45h-3.55v-5.57c0-1.33-.02-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.94v5.67H9.36V9h3.41v1.56h.05c.47-.9 1.63-1.85 3.36-1.85 3.6 0 4.27 2.37 4.27 5.45v6.29zM5.34 7.43a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12zM7.12 20.45H3.55V9h3.57v11.45zM22.22 0H1.77C.79 0 0 .77 0 1.72v20.56C0 23.23.79 24 1.77 24h20.45c.98 0 1.78-.77 1.78-1.72V1.72C24 .77 23.2 0 22.22 0z"/>
          </svg>
          <span>LinkedIn</span>
        </a>
        <a href="mailto:gisellecory@gmail.com">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
            <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 6-10 7L2 6"/>

        </a>

    </div>

  <script>
    const blocks = [
      {
        alt: "Articles",
        img: "Assets/Comms_grid/article_public-finance_older-carer.png",
        text: `<p>Written for outlets including <a href="https://www.publicfinance.co.uk/2012/07/back-to-work-not-if-youre-an-older-carer" target="_blank" rel="noopener">Public Finance</a>, <a href="https://www.huffingtonpost.co.uk/giselle-cory/is-underemployment-the-new-normal_b_2203711.html" target="_blank" rel="noopener">Huffington Post</a>, the Spectator and <a href="http://www.newstatesman.com/politics/2015/04/consensus-breaks-out-over-childcare" target="_blank" rel="noopener">New Statesman</a>.</p>`
      },
      {
        alt: "Datablog",
        img: "Assets/Comms_grid/RF_data_blog.png",
        text: `<p>Founding writer for Resolution Foundation's datablog, the first of its kind in the UK. Read posts on <a href="https://www.resolutionfoundation.org/comment/spending-more-on-less/" target="_blank" rel="noopener">spending</a>, <a href="https://www.resolutionfoundation.org/comment/a-falling-reliance-on-state-pensions/" target="_blank" rel="noopener">pensions</a> and <a href="https://www.resolutionfoundation.org/comment/part-time-work-two-sides-to-every-story/" target="_blank" rel="noopener">work</a>.</p>`
      },
      {
        alt: "Media",
        img: "Assets/Comms_grid/Sky-News.png",
        text: `<p>Policy expert on BBC News (TV and radio) and Sky News (TV) as well as local and international television and radio stations.</p>`
      },
      {
        alt: "Publications",
        img: "Assets/Comms_grid/Doteveryone_social_care.png",
        text: `<p>Authored or co-authored 19 research and policy publications, of which most were widely reported on in the press. Topics included labour market, welfare, housing and family policy. Analysis included microsimulation modelling at the household level and UK-wide tax-benefit system modelling. Read more <a href="https://www.ippr.org/research-library?articles_production%5Bquery%5D=giselle%20cory" target="_blank" rel="noopener">here</a> and <a href="https://www.resolutionfoundation.org/publications/?authors=giselle-cory" target="_blank" rel="noopener">here</a>.</p>`
      },
      {
        alt: "Features",
        img: "Assets/Comms_grid/Economist.png",
        text: `<p>Research, analysis or commentary has appeared in all major UK national newspapers including the FT, Telegraph, Independent, Guardian, Mirror, Mail, Times and Express as well as online news sites including BBC and ITV, and regional newspapers.</p>`
      },
      {
        alt: "Responsible data use",
        img: "Assets/Comms_grid/web_giselle_hosting.jpg",
        text: `<p>Writing that makes data and data science more accessible to the social sector, and highlights ethical approaches particularly in sector-facing publications like <a href="https://charitydigital.org.uk/topics/understanding-the-impact-of-algorithms-7472" target="_blank" rel="noopener">Charity Digital</a> and <a href="https://www.civilsociety.co.uk/finance/becoming-data-driven-on-a-budget-how-to-resource-data-work.html" target="_blank" rel="noopener">Civil Society News</a>. Community building and events, including programming and designing the Data4Good Festival 2021.</p>`
      },
      {
        alt: "Creative writing",
        img: "Assets/Comms_grid/ExtraTeeth.png",
        text: `<p>Won an Emerging Writer's Award for narrative non-fiction and published in two literary journals. Part-way through an MA in Creative and Life Writing from Goldsmiths.</p>`
      }
    ];

    const grid = document.getElementById('writingGrid');
    let activeTileEl = null;
    let expanderEl = null;

    function getLastTileInRow(clickedTile, allTiles) {
      const clickedTop = clickedTile.offsetTop;
      let lastTile = clickedTile;
      let lastIdx = Array.from(allTiles).indexOf(clickedTile);
      Array.from(allTiles).forEach((tile, i) => {
        if (Math.abs(tile.offsetTop - clickedTop) < 5 && i > lastIdx) {
          lastIdx = i;
          lastTile = tile;
        }
      });
      return lastTile;
    }

    function closeExpander() {
      if (expanderEl) {
        expanderEl.remove();
        expanderEl = null;
      }
      if (activeTileEl) {
        activeTileEl.classList.remove('active');
        activeTileEl.setAttribute('aria-expanded', 'false');
        activeTileEl = null;
      }
    }

    function openExpander(tile, block, allTiles) {
      // Remove old expander from DOM first so offsetTop measurements are clean
      if (expanderEl) {
        expanderEl.remove();
        expanderEl = null;
      }

      const lastInRow = getLastTileInRow(tile, allTiles);

      const expander = document.createElement('div');
      expander.className = 'grid-expander';
      expander.setAttribute('role', 'region');
      expander.setAttribute('aria-label', block.alt + ' detail');
      expander.innerHTML = `
        <figure class="expander-figure">
          <img src="${block.img}" alt="${block.alt}">
        </figure>
        <div class="expander-content">${block.text}</div>
        <button class="expander-close" aria-label="Close ${block.alt} detail">&#215;</button>
      `;
      expander.querySelector('.expander-close').addEventListener('click', closeExpander);

      lastInRow.after(expander);
      expanderEl = expander;

      tile.classList.add('active');
      tile.setAttribute('aria-expanded', 'true');
      activeTileEl = tile;

      // Scroll expander into view smoothly
      expander.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // Build tiles
    blocks.forEach((block, i) => {
      const tile = document.createElement('div');
      tile.className = 'writing-tile';
      tile.setAttribute('role', 'listitem');
      tile.setAttribute('tabindex', '0');
      tile.setAttribute('aria-expanded', 'false');
      tile.setAttribute('aria-label', block.alt + ' — click to expand');
      tile.innerHTML = `
        <img src="${block.img}" alt="${block.alt}" loading="lazy">
        <div class="writing-tile-label">${block.alt}</div>
      `;

      const handleActivate = () => {
        const allTiles = grid.querySelectorAll('.writing-tile');
        if (tile === activeTileEl) {
          closeExpander();
        } else {
          if (activeTileEl) activeTileEl.classList.remove('active');
          openExpander(tile, block, allTiles);
        }
      };

      tile.addEventListener('click', handleActivate);
      tile.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          handleActivate();
        }
      });

      grid.appendChild(tile);
    });

    // Close on Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && expanderEl) closeExpander();
    });
  </script>
</body>
</html>
