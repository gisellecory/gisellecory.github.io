<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giselle Cory</title>

  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="icon" href="favicon-32.png" sizes="32x32" type="image/png">
  <link rel="icon" href="favicon-16.png" sizes="16x16" type="image/png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="theme-color" content="#E87722">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #FCF8F2;
      --section:   #F4ECE0;
      --ink:       #201B2E;
      --ink-soft:  #46414F;
      --coral:     #D8451F;
      --coral-text:#B83214;
      --teal:      #0F766E;
      --plum:      #6B2FA0;
      --mustard:   #B7791F;
      --pink:      #C2255C;
      --line:      #E2D7C7;
      --focus:     #0F766E;
    }

    html { scroll-behavior: smooth; }
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 1.0625rem;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: clip;
    }

    .skip-link {
      position: absolute; left: -999px; top: 0;
      background: var(--ink); color: #fff; padding: 0.7rem 1.1rem;
      border-radius: 0 0 8px 0; z-index: 1000; font-weight: 600;
    }
    .skip-link:focus { left: 0; }

    a:focus-visible, button:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 3px;
      border-radius: 3px;
    }

    .wrap { width: min(1080px, 100% - 3rem); margin-inline: auto; }

    /* ===== NAV ===== */
    .site-nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(252, 248, 242, 0.94);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
    }
    .nav-inner {
      width: min(1080px, 100% - 3rem); margin-inline: auto;
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem; padding: 0.9rem 0; flex-wrap: wrap;
    }
    .nav-name {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 600; font-size: 1.2rem; letter-spacing: 0.01em;
      color: var(--ink); text-decoration: none; white-space: nowrap;
    }
    .nav-name span { color: var(--coral); }
    .nav-menu {
      display: flex; gap: 1.4rem; list-style: none; flex-wrap: wrap;
    }
    .nav-menu a {
      font-size: 0.82rem; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; text-decoration: none;
      color: var(--ink-soft); padding: 0.25rem 0; position: relative;
    }
    .nav-menu a::after {
      content: ''; position: absolute; left: 0; bottom: -2px;
      width: 0; height: 2px; background: var(--coral); transition: width 0.25s ease;
    }
    .nav-menu a:hover, .nav-menu a:focus-visible { color: var(--ink); }
    .nav-menu a:hover::after, .nav-menu a:focus-visible::after { width: 100%; }

    /* ===== MAIN CONTENT ===== */
    .band { padding: clamp(3rem, 7vw, 5rem) 0; }

    .video-container {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%; /* 16:9 aspect ratio */
      height: 0;
      overflow: hidden;
      border-radius: 14px;
      box-shadow: 0 22px 48px -22px rgba(32, 27, 46, 0.45);
      background: var(--section);
    }
    .video-container iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: 0;
      border-radius: 14px;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      .nav-menu { gap: 0.4rem; flex-wrap: nowrap; }
      .nav-menu a { font-size: 0.6rem; letter-spacing: 0.04em; }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-nav">
    <nav class="nav-inner" aria-label="Primary">
      <a class="nav-name" href="index.html">Giselle <span>Cory</span></a>
      <ul class="nav-menu">
        <li><a href="index.html#about">About</a></li>
        <li><a href="index.html#writing-media">Writing</a></li>
        <li><a href="index.html#highlights">Highlights</a></li>
        <li><a href="index.html#organisations">Orgs</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main id="main">
    <section class="band">
      <div class="wrap">

        <h2 style="font-family: 'Fraunces', Georgia, serif; font-weight: 600; font-size: clamp(1.8rem, 4vw, 2.6rem); line-height: 1.1; letter-spacing: -0.01em; margin-bottom: 2rem; color: var(--coral);">Forward Institute</h2>

        <div class="video-container">
          <iframe width="560" height="315" src="https://www.youtube.com/embed/BSuJOTDReHE?si=ZUqK2YNlGweGx9KT" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        </div>

      </div>
    </section>
  </main>

</body>
</html>
